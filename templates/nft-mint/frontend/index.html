<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Mint - BlockAI Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .status.active {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }
        
        .status.inactive {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
            border: 1px solid #9e9e9e;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .info-label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 8px;
        }
        
        .info-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .mint-section {
            text-align: center;
        }
        
        .mint-input {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .mint-input input {
            width: 80px;
            padding: 12px;
            font-size: 1.2em;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .wallet-section {
            text-align: center;
            padding: 20px;
        }
        
        .wallet-address {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 10px 0;
            word-break: break-all;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }
        
        .message.info {
            background: rgba(102,126,234,0.2);
            color: #667eea;
            border: 1px solid #667eea;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            color: #888;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .info-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 NFT Mint</h1>
            <p>BlockAI Production Template</p>
            <div id="saleStatus" class="status inactive">Loading...</div>
        </header>
        
        <div class="card">
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Total Supply</div>
                    <div class="info-value">10,000</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Minted</div>
                    <div class="info-value" id="mintedCount">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Remaining</div>
                    <div class="info-value" id="remainingCount">10,000</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Price</div>
                    <div class="info-value" id="currentPrice">-</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="card wallet-section" id="walletSection">
            <h3>🔗 Connect Wallet</h3>
            <p style="color: #888; margin: 10px 0;">Connect your Web3 wallet to mint</p>
            <button class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
        </div>
        
        <div class="card mint-section" id="mintSection" style="display: none;">
            <h3>🚀 Mint Your NFT</h3>
            
            <div class="wallet-address" id="walletAddress"></div>
            
            <div class="mint-input">
                <label>Quantity:</label>
                <input type="number" id="mintQuantity" min="1" max="5" value="1" onchange="updateCost()">
            </div>
            
            <p>Total Cost: <strong id="totalCost" style="color: #667eea;">0</strong> ETH</p>
            
            <button class="btn btn-primary" id="mintBtn" onclick="mintNFT()">
                Mint NFT
            </button>
            
            <div id="messageArea"></div>
        </div>
        
        <footer>
            <p>BlockAI NFT Mint Template v1.0</p>
            <p>Production Ready • Security Audited</p>
        </footer>
    </div>
    
    <script>
        let contract;
        let signer;
        let provider;
        
        // Contract address (update after deployment)
        const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000";
        
        // Initialize
        async function init() {
            if (typeof window.ethereum !== 'undefined') {
                provider = new ethers.BrowserProvider(window.ethereum);
                await updateContractInfo();
            } else {
                showMessage("Please install MetaMask!", "error");
            }
        }
        
        // Connect wallet
        async function connectWallet() {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, NFT_ABI, signer);
                
                document.getElementById('walletAddress').textContent = 
                    `${accounts[0].substring(0, 6)}...${accounts[0].substring(38)}`;
                document.getElementById('walletSection').style.display = 'none';
                document.getElementById('mintSection').style.display = 'block';
                
                await updateContractInfo();
                showMessage("Wallet connected!", "success");
            } catch (error) {
                showMessage("Failed to connect wallet", "error");
                console.error(error);
            }
        }
        
        // Update contract info
        async function updateContractInfo() {
            if (!contract) return;
            
            try {
                const minted = await contract.totalMinted();
                const remaining = await contract.remainingSupply();
                const publicPrice = await contract.publicPrice();
                
                document.getElementById('mintedCount').textContent = minted.toString();
                document.getElementById('remainingCount').textContent = remaining.toString();
                document.getElementById('currentPrice').textContent = ethers.formatEther(publicPrice);
                
                const progress = (Number(minted) / 10000) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                
                // Update status
                const now = Math.floor(Date.now() / 1000);
                const publicStart = await contract.publicStartTime();
                const statusEl = document.getElementById('saleStatus');
                
                if (now >= Number(publicStart)) {
                    statusEl.textContent = "Public Sale Active";
                    statusEl.className = "status active";
                } else {
                    statusEl.textContent = "Sale Not Started";
                    statusEl.className = "status inactive";
                }
                
                updateCost();
            } catch (error) {
                console.error("Error updating info:", error);
            }
        }
        
        // Update cost
        async function updateCost() {
            if (!contract) return;
            
            const quantity = parseInt(document.getElementById('mintQuantity').value);
            const publicPrice = await contract.publicPrice();
            const total = publicPrice * BigInt(quantity);
            
            document.getElementById('totalCost').textContent = ethers.formatEther(total);
        }
        
        // Mint NFT
        async function mintNFT() {
            try {
                const quantity = parseInt(document.getElementById('mintQuantity').value);
                const publicPrice = await contract.publicPrice();
                const total = publicPrice * BigInt(quantity);
                
                const tx = await contract.mintPublic(quantity, { value: total });
                showMessage("Transaction submitted! Waiting for confirmation...", "info");
                
                await tx.wait();
                showMessage(`Successfully minted ${quantity} NFT(s)!`, "success");
                
                await updateContractInfo();
            } catch (error) {
                showMessage(`Error: ${error.message}`, "error");
                console.error(error);
            }
        }
        
        // Show message
        function showMessage(text, type) {
            const msgEl = document.getElementById('messageArea');
            msgEl.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            setTimeout(() => {
                msgEl.innerHTML = '';
            }, 5000);
        }
        
        // NFT ABI (minimal)
        const NFT_ABI = [
            "function mintPublic(uint256 quantity) payable",
            "function totalMinted() view returns (uint256)",
            "function remainingSupply() view returns (uint256)",
            "function publicPrice() view returns (uint256)",
            "function publicStartTime() view returns (uint256)"
        ];
        
        // Auto-init
        init();
    </script>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
</body>
</html>
